<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LEDGER – Expense Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>

<!-- ══════════════════════════ AUTH SCREEN ══════════════════════════════ -->
<div id="authScreen" class="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">⬡</div>
    <div class="auth-title">LEDGER</div>
    <div class="auth-sub">Expense Intelligence</div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin"  onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab"        id="tabReg"    onclick="switchTab('register')">Create Account</button>
    </div>

    <!-- Login -->
    <div id="loginForm">
      <label class="lbl">Username</label>
      <input id="loginUser" class="inp" type="text" placeholder="your username" autocomplete="username"/>
      <label class="lbl">Password</label>
      <input id="loginPass" class="inp" type="password" placeholder="••••••••" autocomplete="current-password"/>
      <div class="auth-hint">Demo → <strong>demo</strong> / <strong>demo123</strong></div>
      <button class="add-btn" onclick="doLogin()">SIGN IN →</button>
      <div class="form-error" id="loginError"></div>
    </div>

    <!-- Register -->
    <div id="registerForm" style="display:none">
      <label class="lbl">Username</label>
      <input id="regUser" class="inp" type="text" placeholder="choose a username" autocomplete="username"/>
      <label class="lbl">Password</label>
      <input id="regPass" class="inp" type="password" placeholder="at least 4 characters" autocomplete="new-password"/>
      <label class="lbl">Default Currency</label>
      <select id="regCurrency" class="inp sel">
        <option value="USD">USD – US Dollar ($)</option>
        <option value="EUR">EUR – Euro (€)</option>
        <option value="GBP">GBP – British Pound (£)</option>
        <option value="JPY">JPY – Japanese Yen (¥)</option>
        <option value="INR">INR – Indian Rupee (₹)</option>
        <option value="CAD">CAD – Canadian Dollar (CA$)</option>
        <option value="AUD">AUD – Australian Dollar (A$)</option>
        <option value="CHF">CHF – Swiss Franc (Fr)</option>
        <option value="CNY">CNY – Chinese Yuan (¥)</option>
        <option value="BRL">BRL – Brazilian Real (R$)</option>
        <option value="MXN">MXN – Mexican Peso (MX$)</option>
        <option value="SGD">SGD – Singapore Dollar (S$)</option>
      </select>
      <button class="add-btn" onclick="doRegister()">CREATE ACCOUNT →</button>
      <div class="form-error" id="regError"></div>
    </div>
  </div>
</div>

<!-- ══════════════════════════ APP SCREEN ═══════════════════════════════ -->
<div id="appScreen" style="display:none">

  <header class="header">
    <div class="header-left">
      <span class="logo">⬡</span>
      <div>
        <div class="title">LEDGER</div>
        <div class="subtitle">Expense Intelligence</div>
      </div>
    </div>
    <div class="header-center">
      <div class="total-badge">
        <div class="total-label">TOTAL SPENT</div>
        <div class="total-value" id="totalValue">—</div>
      </div>
    </div>
    <div class="header-right">
      <div class="currency-wrap">
        <span class="ctrl-label">CURRENCY</span>
        <select id="currencySelect" class="currency-sel" onchange="changeCurrency(this.value)">
          <option value="USD">USD $</option>
          <option value="EUR">EUR €</option>
          <option value="GBP">GBP £</option>
          <option value="JPY">JPY ¥</option>
          <option value="INR">INR ₹</option>
          <option value="CAD">CAD CA$</option>
          <option value="AUD">AUD A$</option>
          <option value="CHF">CHF Fr</option>
          <option value="CNY">CNY ¥</option>
          <option value="BRL">BRL R$</option>
          <option value="MXN">MXN MX$</option>
          <option value="SGD">SGD S$</option>
        </select>
      </div>
      <button class="hdr-btn" onclick="toggleHistory()">⏱ History</button>
      <div class="user-pill">
        <span class="user-icon">◎</span>
        <span id="userLabel">—</span>
        <button class="logout-btn" onclick="doLogout()">↩</button>
      </div>
    </div>
  </header>

  <div class="layout" id="mainLayout">
    <aside class="aside">
      <section class="card" id="addCard">
        <div class="card-title">NEW ENTRY</div>
        <label class="lbl">Description</label>
        <input id="inpDesc" class="inp" type="text" placeholder="e.g. Coffee &amp; pastry" autocomplete="off"/>
        <div class="row-2">
          <div>
            <label class="lbl" id="amountLabel">Amount</label>
            <input id="inpAmount" class="inp" type="number" placeholder="0.00" min="0" step="0.01"/>
          </div>
          <div>
            <label class="lbl">Date</label>
            <input id="inpDate" class="inp" type="date"/>
          </div>
        </div>
        <label class="lbl">Category</label>
        <div class="cat-grid" id="catGrid"></div>
        <button class="add-btn" id="addBtn">+ ADD EXPENSE</button>
        <div class="form-error" id="formError"></div>
      </section>

      <section class="card">
        <div class="card-title">BREAKDOWN</div>
        <div id="breakdown"></div>
      </section>
    </aside>

    <main class="main">
      <div class="controls">
        <div class="filter-row" id="filterRow">
          <span class="ctrl-label">FILTER</span>
        </div>
        <div class="filter-row">
          <span class="ctrl-label">SORT</span>
          <button class="fbtn active" data-sort="date">Date</button>
          <button class="fbtn" data-sort="amount">Amount</button>
          <button class="fbtn" data-sort="description">Name</button>
        </div>
      </div>
      <div id="expenseList"></div>
    </main>

    <!-- History panel -->
    <aside class="history-panel" id="historyPanel">
      <div class="history-header">
        <div class="card-title" style="margin:0">ACTIVITY LOG</div>
        <button class="icon-btn" onclick="toggleHistory()">×</button>
      </div>
      <div id="historyList" class="history-list"></div>
    </aside>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">EDIT ENTRY</div>
    <input type="hidden" id="editId"/>
    <label class="lbl">Description</label>
    <input id="editDesc" class="inp" type="text"/>
    <div class="row-2">
      <div>
        <label class="lbl" id="editAmountLabel">Amount</label>
        <input id="editAmount" class="inp" type="number" step="0.01"/>
      </div>
      <div>
        <label class="lbl">Date</label>
        <input id="editDate" class="inp" type="date"/>
      </div>
    </div>
    <label class="lbl">Category</label>
    <div class="cat-grid" id="editCatGrid"></div>
    <div class="modal-actions">
      <button class="cancel-btn" id="cancelEdit">Cancel</button>
      <button class="add-btn"    id="saveEdit">Save Changes</button>
    </div>
  </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
